<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxtouch Links</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

.logo {
    font-size: 32px;
    font-weight: bold;
    color: #ffcc00;
    letter-spacing: 2px;
    margin-bottom: 10px;

.tagline {

}

.btn {
    display: block;
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 15px;
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    color: #000;
    text-decoration: none;
    font-weight: bold;
    border-radius: 12px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<div class="container">
    <div class="logo">MAXTOUCH</div>
